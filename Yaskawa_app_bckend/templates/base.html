{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>YASKAWA Sales&Support</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<header class="main-header">
    <div class="header-left">
        <img src="{% static 'image/yaskawa-logo.png' %}" alt="Logo">
    </div>
    <nav class="header-right">
        {% if user.is_authenticated %}
            <a href="{% url 'home' %}">Dashboard</a>
            <a href="#">About us</a>
            <a href="#">Support</a>
            <div class="user-profile-circle">{{ initials }}</div>
            <a href="{% url 'logout' %}" style="color:red">Logout</a>
        {% else %}
            <a href="#">About us</a>
            <a href="#">Support</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="main-footer" style="text-align:center; padding:20px; color:#666; border-top:1px solid #ddd;">
    © 2026 YASKAWA – Sales & Support
</footer>
</body>
</html>
