{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="dashboard-container">

    <div class="search-container">
        <div class="search-box">
            <span class="search-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0057B8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </span>
            <input type="text" id="categorySearch" placeholder="Search..." class="search-input">
        </div>
    </div>

    <div class="category-grid">
        {% for cat in categories %}
        <div class="category-card">
            <img src="{% static 'image/' %}{{ cat.img }}" alt="{{ cat.name }}" onerror="this.style.display='none'">
            
            <div class="category-label">
                {{ cat.name }}
            </div>
        </div>
        {% endfor %}
    </div>

</div>

<script>
    document.getElementById('categorySearch').addEventListener('input', function(e) {
        let filter = e.target.value.toLowerCase();
        let cards = document.querySelectorAll('.category-card');
        
        cards.forEach(card => {
            let name = card.querySelector('.category-label').textContent.toLowerCase();
            // Si le nom contient la recherche, on affiche, sinon on cache
            if (name.includes(filter)) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }
        });
    });
</script>
{% endblock %}
