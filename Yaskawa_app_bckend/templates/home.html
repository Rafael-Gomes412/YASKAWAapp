{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="dashboard-container">

    <div class="search-container">
        <div class="search-box">
            <span class="search-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0057B8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </span>
            <input type="text" id="categorySearch" placeholder="Search..." class="search-input">
        </div>
    </div>

    <div class="category-grid">
        {% for cat in categories %}
        <a href="{% url 'category_detail' cat.slug %}" class="category-link" style="text-decoration: none; color: inherit;">
            <div class="category-card">
                {% if cat.image_home %}
                    <img src="{{ cat.image_home.url }}" alt="{{ cat.name }}">
                {% else %}
                    <img src="{% static 'image/default-category.png' %}" alt="Default">
                {% endif %}
                
                <div class="category-label">
                    {{ cat.name }}
                </div>
            </div>
        </a>
        {% empty %}
        <p style="text-align: center; width: 100%;">Aucune catégorie disponible. Ajoutez-en dans l'administration.</p>
        {% endfor %}
    </div>

</div>

<script>
    // Le script de recherche reste fonctionnel avec les nouveaux liens
    document.getElementById('categorySearch').addEventListener('input', function(e) {
        let filter = e.target.value.toLowerCase();
        let cards = document.querySelectorAll('.category-link');
        
        cards.forEach(card => {
            let name = card.querySelector('.category-label').textContent.toLowerCase();
            if (name.includes(filter)) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }
        });
    });
</script>
{% endblock %}
